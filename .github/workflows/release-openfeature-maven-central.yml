name: Publish OpenFeature Provider Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish (tag, branch, or SHA)'
        required: true
        type: string
      confirm_version:
        description: 'Confirm the version to publish (must match version in openfeature-provider build.gradle.kts)'
        required: true
        type: string

# Prevent concurrent publishes
concurrency:
  group: openfeature-maven-publish
  cancel-in-progress: false

# Minimum required permissions
permissions:
  contents: read

jobs:
  publish:
    name: "Publish OpenFeature Provider to Maven Central"
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Validate secrets
        run: |
          missing=""
          if [ -z "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ]; then missing="$missing MAVEN_CENTRAL_USERNAME"; fi
          if [ -z "${{ secrets.MAVEN_CENTRAL_TOKEN }}" ]; then missing="$missing MAVEN_CENTRAL_TOKEN"; fi
          if [ -z "${{ secrets.GPG_PRIVATE_KEY }}" ]; then missing="$missing GPG_PRIVATE_KEY"; fi
          if [ -z "${{ secrets.GPG_PASSPHRASE }}" ]; then missing="$missing GPG_PASSPHRASE"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Validate version
        run: |
          GRADLE_VERSION=$(grep "^VERSION_NAME=" openfeature-provider/gradle.properties | cut -d'=' -f2)
          if [ "${{ inputs.confirm_version }}" != "$GRADLE_VERSION" ]; then
            echo "::error::Input version '${{ inputs.confirm_version }}' does not match gradle.properties VERSION_NAME '$GRADLE_VERSION'"
            exit 1
          fi
          echo "Version confirmed: $GRADLE_VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@11d4d83c63a6ce61b32d8a9c4faddbdb04fe9917  # v4

      - name: Clean
        run: ./gradlew clean

      - name: Build
        run: ./gradlew :openfeature-provider:build

      - name: Run tests
        run: ./gradlew :openfeature-provider:test

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: failure()
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew :openfeature-provider:publishRelease

      - name: Upload to Maven Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
        run: |
          # Get the namespace from gradle.properties
          NAMESPACE=$(grep "^GROUP=" gradle.properties | cut -d'=' -f2)

          # Create Bearer auth token (as per docs)
          AUTH_TOKEN=$(echo -n "$MAVEN_CENTRAL_USERNAME:$MAVEN_CENTRAL_PASSWORD" | base64)

          # Call the manual upload endpoint
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${NAMESPACE}?publishing_type=user_managed")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Error: Portal upload failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          echo "Success! Deployment uploaded to Portal."

      - name: Summary
        run: |
          echo "## OpenFeature Provider - Maven Central Publish Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version **${{ inputs.confirm_version }}** has been staged to Maven Central." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [Maven Central Portal](https://central.sonatype.com/publishing/deployments)" >> $GITHUB_STEP_SUMMARY
          echo "2. Review the staged artifacts" >> $GITHUB_STEP_SUMMARY
          echo "3. Click **Publish** to make the release live" >> $GITHUB_STEP_SUMMARY
