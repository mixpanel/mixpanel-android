name: Publish SDK Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      publishing_type:
        description: 'Publishing type for the deployment'
        required: true
        default: 'user_managed'
        type: choice
        options:
          - user_managed
          - automatic
      version_override:
        description: 'Version to publish (leave empty to use gradle.properties VERSION_NAME)'
        required: false
        type: string

# Prevent concurrent publishes
concurrency:
  group: sdk-maven-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: "Publish SDK to Maven Central"
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Validate secrets
        run: |
          missing=""
          if [ -z "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ]; then missing="$missing MAVEN_CENTRAL_USERNAME"; fi
          if [ -z "${{ secrets.MAVEN_CENTRAL_TOKEN }}" ]; then missing="$missing MAVEN_CENTRAL_TOKEN"; fi
          if [ -z "${{ secrets.GPG_PRIVATE_KEY }}" ]; then missing="$missing GPG_PRIVATE_KEY"; fi
          if [ -z "${{ secrets.GPG_PASSPHRASE }}" ]; then missing="$missing GPG_PASSPHRASE"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4

      - name: Override version if specified
        if: inputs.version_override != ''
        run: |
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=${{ inputs.version_override }}/" gradle.properties
          echo "Updated version to: ${{ inputs.version_override }}"

      - name: Validate version
        run: |
          VERSION=$(grep "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          if echo "$VERSION" | grep -q "SNAPSHOT"; then
            echo "::error::VERSION_NAME ($VERSION) contains SNAPSHOT. Set a release version before publishing."
            exit 1
          fi
          echo "Publishing version: $VERSION"

      - name: Clean
        run: ./gradlew clean

      - name: Build
        run: ./gradlew :build

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew :publishRelease

      - name: Upload to Maven Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
        run: |
          NAMESPACE=$(grep "^GROUP=" gradle.properties | cut -d'=' -f2)
          AUTH_TOKEN=$(echo -n "$MAVEN_CENTRAL_USERNAME:$MAVEN_CENTRAL_PASSWORD" | base64)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${NAMESPACE}?publishing_type=${{ inputs.publishing_type }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Error: Portal upload failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          echo "Success! Deployment uploaded to Portal."

      - name: Summary
        run: |
          VERSION=$(grep "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          echo "## SDK Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Publishing Type**: ${{ inputs.publishing_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.publishing_type }}" == "user_managed" ]; then
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to [Maven Central Portal Deployments](https://central.sonatype.com/publishing/deployments)" >> $GITHUB_STEP_SUMMARY
            echo "2. Find your deployment (version $VERSION)" >> $GITHUB_STEP_SUMMARY
            echo "3. Review and click 'Publish' to release to Maven Central" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Status" >> $GITHUB_STEP_SUMMARY
            echo "Deployment will be automatically released if validation passes" >> $GITHUB_STEP_SUMMARY
          fi
